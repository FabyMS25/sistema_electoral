services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - laravel-net
    command: >
      sh -c "php artisan migrate --seed --force && php-fpm"

  db:
    image: postgres:14
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: counter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: counter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5300:5432" # external 5300 -> internal 5432
    networks:
      - laravel-net

  nginx:
    image: nginx:alpine
    container_name: nginx-server
    restart: unless-stopped
    ports:
      - "4300:80" # external 4300 -> internal 80
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel-net

volumes:
  postgres_data:

networks:
  laravel-net:
