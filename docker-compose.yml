version: '3.8'

services:
  app:
    build: .
    container_name: laravel-app
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - laravel-net
    command: >
      sh -c "php artisan migrate --seed --force && php-fpm"

  db:
    image: postgres:14
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - laravel-net

  nginx:
    image: nginx:alpine
    container_name: nginx-server
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel-net

volumes:
  postgres_data:

networks:
  laravel-net:
