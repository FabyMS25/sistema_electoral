services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - db
    networks:
      - laravel-net
    ports:
      - "9000:9000"

  db:
    image: postgres:14
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: counter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: counter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5300:5432"
    networks:
      - laravel-net

volumes:
  postgres_data:

networks:
  laravel-net:
    driver: bridge